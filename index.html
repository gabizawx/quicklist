<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Quicklist</title>
</head>
<body>
    <header>
        <img src="./img/quicklist-imagens/logo.png" alt="Logo do Quicklist">
    </header>

    <main>
        <section class="adicionar-item">
            <h1>Compras da semana</h1>

            <div>
                <input type="text" placeholder="Adicionar um item" id="novo-item">
                <button>Adicionar item</button>
            </div>
        </section>

        <section class="itens">
            <div class="item">
                <div>
                    <input type="checkbox" id="item-1">

                    <div class="checkbox-customizada">
                        <img src="./img/quicklist-imagens/checked.svg" alt="ícone do checkbox">
                    </div>
                    
                    <label for="item-1">Pão de forma</label>
                </div>

                <button>
                    <img src="./img/quicklist-imagens/trash-icon.svg" alt="ícone do lixo">
                </button>
            </div>
            
        </section>
    </main>

</body>
</html>
